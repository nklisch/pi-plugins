name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      CI: "1"
      PI_PLUGIN_HOST_E2E_REQUIRE_PTY: "1"
      PI_PLUGIN_HOST_E2E_REQUIRE_LIBFAKETIME: "1"
      PI_PLUGIN_HOST_E2E_TIMEOUT_SCALE: "2"
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false
      - name: Install required native E2E capabilities
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends git util-linux libfaketime
      - name: Install dependencies
        run: npm ci
      - name: Verify unit, boundaries, build, exports, and package
        run: npm test
      - name: Verify packed clean-environment and from-empty registry E2E
        run: npm run test:e2e
